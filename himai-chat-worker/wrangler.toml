name = "himai-chat-worker"
main = "src/index.js"
compatibility_date = "2026-04-11"

[vars]
APP_NAME = "Himai Shop"
AIRTABLE_BASE_ID = "appsV1ILPRfIjkaYg"
AIRTABLE_SUPPLIERS_TABLE = "Suppliers"
DEFAULT_TIMEZONE = "Asia/Bangkok"
LINE_OA_HANDLE = "@himaishop"
LINE_OA_URL = "https://line.me/R/ti/p/@himaishop"
REGISTER_PREFIX = "REGISTER HIMAI"

# Airtable table IDs (configurable per environment)
HIMAI_CUSTOMERS_TABLE_ID = "tblmNV3LP9kvXOzcU"
CONSOLE_INBOX_TABLE_ID = "tblFHmfpB2TTrzO2e"

# ---- Secrets (set via: wrangler secret put <NAME>) ----
# AIRTABLE_TOKEN           - Airtable API authentication
# LINE_CHANNEL_SECRET      - LINE webhook signature verification
# LINE_CHANNEL_ACCESS_TOKEN - LINE Bot API token
# INTERNAL_TOKEN           - Internal endpoint authorization
