name = "immigrate-worker"
main = "src/index.ts"
compatibility_date = "2026-03-25"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
AIRTABLE_BASE_ID = "appsV1ILPRfIjkaYg"
AIRTABLE_TABLE_LINE_INBOX = "Line Inbox"
AIRTABLE_TABLE_CLIENTS = "Clients"
AIRTABLE_TABLE_SESSIONS = "tblC98mKWbzmPuNzX"
ENABLE_AIRTABLE_SYNC = "true"
JOBS_WORKER_BASE_URL = ""
CREATE_LINKS_URL = "https://payments-worker.malemodel-bkk.workers.dev/v1/confirm/link"
REALTIME_SESSIONS_URL = ""
PUBLIC_WEB_BASE_URL = "https://www.mmdbkk.com"
PUBLIC_ALLOWED_ORIGINS = "https://mmdbkk.com,https://www.mmdbkk.com,https://sigil.mmdbkk.com,https://mmdprive.com,https://www.mmdprive.com,https://mmdprive.webflow.io"
ADMIN_WORKER_BASE_URL = "https://admin-worker.malemodel-bkk.workers.dev"

# Set via secrets:
# wrangler secret put INTERNAL_TOKEN
# wrangler secret put AIRTABLE_API_KEY

# SIGIL root is owned by admin-worker. This Worker only owns static admin assets.
# Do not use sigil.mmdbkk.com/* here, or Cloudflare will reject deploy with route conflict 10020.
[[routes]]
pattern = "sigil.mmdbkk.com/a/*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "mmdbkk.com/internal/admin/control-room*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "www.mmdbkk.com/internal/admin/control-room*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "mmdbkk.com/internal/admin/create-session*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "www.mmdbkk.com/internal/admin/create-session*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "mmdbkk.com/internal/admin/jobs/create-session*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "www.mmdbkk.com/internal/admin/jobs/create-session*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "mmdbkk.com/internal/jobs*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "www.mmdbkk.com/internal/jobs*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "mmdbkk.com/v1/admin/*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "www.mmdbkk.com/v1/admin/*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "mmdbkk.com/member/api/invite*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "www.mmdbkk.com/member/api/invite*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "mmdbkk.com/member/api/renewal*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "www.mmdbkk.com/member/api/renewal*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "mmdbkk.com/member/api/jobs*"
zone_name = "mmdbkk.com"

[[routes]]
pattern = "www.mmdbkk.com/member/api/jobs*"
zone_name = "mmdbkk.com"
