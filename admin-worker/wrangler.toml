# admin-worker/wrangler.toml
# LOCK v2026-LOCK-01

name = "admin-worker"
main = "src/index.js"
compatibility_date = "2026-01-01"
workers_dev = true

[[services]]
binding = "TELEGRAM_WORKER"
service = "telegram-worker"

# ใช้สำหรับ CORS (browser calls)
